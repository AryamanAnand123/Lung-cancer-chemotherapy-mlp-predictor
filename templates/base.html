<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Lung Cancer Clinical AI{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>
  <body>
    <div class="app-bg"></div>
    <nav class="navbar navbar-expand-lg top-nav">
      <div class="container-fluid px-4">
        <a class="navbar-brand fw-semibold" href="{{ url_for('index') }}"
          >Lung Cancer Clinical AI</a
        >
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="{{ url_for('index') }}">Prediction</a>
          <a class="nav-link" href="{{ url_for('status') }}">Status</a>
        </div>
      </div>
    </nav>

    <main class="container-fluid px-4 py-4">
      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %}
      <div class="mb-3">
        {% for category, message in messages %}
        <div
          class="alert alert-{{ 'danger' if category == 'error' else category }} mb-2"
          role="alert"
        >
          {{ message }}
        </div>
        {% endfor %}
      </div>
      {% endif %} {% endwith %} {% block content %}{% endblock %}
    </main>
  </body>
</html>
